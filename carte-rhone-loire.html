<!DOCTYPE html>

<title>Carte des grappes — Rhône / Loire / Haute-Loire — RBV</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html, body { margin:0; height:100%; font-family: system-ui, Arial, sans-serif; }
  #map { height:100vh; width:100%; }
  .badge {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    line-height:1.05; text-align:center; white-space:nowrap;
    border-radius:14px; padding:3px 7px; color:#fff;
    border:2px solid rgba(255,255,255,.85);
    box-shadow:0 1px 3px rgba(0,0,0,.45); font-weight:600;
  }
  .badge .nom { font-size:10px; }
  .badge.centre { border:3px solid #fff; box-shadow:0 0 0 2px #222, 0 1px 4px rgba(0,0,0,.5); }
  .leaflet-tooltip.pop-tt { font-size:12px; }
  /* Mode cartouches masquées : pastilles seules */
  .labels-hidden .badge { width:13px; height:13px; padding:0; border-radius:50%; }
  .labels-hidden .badge .nom { display:none; }
  .toggle-btn {
    background:#fff; padding:6px 10px; font-size:13px; cursor:pointer;
    border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,.3); font-weight:600; user-select:none;
  }
  .legend {
    background:#fff; padding:10px 12px; border-radius:8px; line-height:1.6;
    box-shadow:0 1px 5px rgba(0,0,0,.3); font-size:13px;
  }
  .legend .dot { display:inline-block; width:12px; height:12px; border-radius:50%; margin-right:6px; vertical-align:middle; border:1px solid #999;}
  .legend h4 { margin:0 0 6px; font-size:13px; }
  .legend small { color:#555; }
</style>
</head>

const map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:18, attribution:'&copy; OpenStreetMap'
}).addTo(map);

const fmt = n => n.toLocaleString('fr-FR');
const overlays = {};
const allBounds = [];

grappes.forEach(g => {
  const layer = L.layerGroup();
  const dark = lightColors.includes(g.color);
  g.communes.forEach(c => {
    const icon = L.divIcon({
      className:'',
      html:`<div class="badge ${c.centre?'centre':''}" style="background:${g.color};${dark?'color:#222;text-shadow:none;':''}">
              <span class="nom">${c.centre?'★ ':''}${c.n}</span>
            </div>`,
      iconSize:null, iconAnchor:[0,0]
    });
    const m = L.marker([c.lat,c.lon],{icon}).addTo(layer);
    m.bindTooltip(`<b>${c.n}</b><br>${fmt(c.pop)} hab.`, {className:'pop-tt', direction:'top', offset:[0,-6]});
    m.bindPopup(`<b>${c.n}</b> (${c.d})<br>Population : <b>${fmt(c.pop)}</b> hab.<br>${g.nom}`);
    allBounds.push([c.lat,c.lon]);
  });
  layer.addTo(map);
  const total = g.communes.reduce((s,c)=>s+c.pop,0);
  overlays[`<span style="color:${g.color};font-weight:700">●</span> ${g.nom} <small>(${fmt(total)} hab.)</small>`] = layer;
});

L.control.layers(null, overlays, {collapsed:true}).addTo(map);
map.fitBounds(allBounds, {padding:[40,40]});

const toggle = L.control({position:'topleft'});
toggle.onAdd = function(){
  const b = L.DomUtil.create('div','toggle-btn');
  b.innerHTML = 'Masquer les noms';
  L.DomEvent.disableClickPropagation(b);
  b.onclick = () => {
    const hidden = document.body.classList.toggle('labels-hidden');
    b.innerHTML = hidden ? 'Afficher les noms' : 'Masquer les noms';
  };
  return b;
};
toggle.addTo(map);

const legend = L.control({position:'bottomleft'});
legend.onAdd = function(){
  const div = L.DomUtil.create('div','legend');
  let rows = '';
  grappes.forEach(g=>{
    const total = g.communes.reduce((s,c)=>s+c.pop,0);
    rows += `<div><span class="dot" style="background:${g.color}"></span>${g.nom} — <b>${fmt(total)}</b> hab.</div>`;
  });
  div.innerHTML = `<h4 class="legend-toggle">Grappes de résidences <span class="arrow">▾</span></h4>`+
                  `<div class="legend-body">${rows}<small>★ = centre de grappe · Survol / clic = population</small></div>`;
  L.DomEvent.disableClickPropagation(div);
  const head = div.querySelector('.legend-toggle');
  const body = div.querySelector('.legend-body');
  const arrow = div.querySelector('.arrow');
  head.style.cursor = 'pointer';
  head.onclick = () => {
    const hidden = body.style.display === 'none';
    body.style.display = hidden ? 'block' : 'none';
    arrow.textContent = hidden ? '▾' : '▸';
  };
  return div;
};
legend.addTo(map);
</script>
